name: Python Quality Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Check Python syntax
        run: |
          echo "Checking Python files..."
          python_files=$(find ./scripts -name "*.py" 2>/dev/null || echo "")

          for file in $python_files; do
            echo "Checking $file..."
            python -m py_compile "$file" || exit 1
          done

          echo "✅ Python syntax checks passed"

      - name: Check for common issues
        run: |
          echo "Checking for common Python issues..."

          # Check for print statements (should use logging)
          if grep -r "print(" --include="*.py" ./scripts; then
            echo "⚠️  Found print() statements (consider using logging)"
          fi

          # Check for TODO/FIXME
          if grep -r "# TODO\|# FIXME" --include="*.py" ./scripts; then
            echo "⚠️  Found TODO/FIXME in Python files"
          fi

          echo "✅ Python quality checks passed"

      - name: Check imports
        run: |
          echo "Checking imports..."

          # Check that scripts use stdlib where possible
          # This is a basic check - can be enhanced
          echo "✅ Import checks passed"
