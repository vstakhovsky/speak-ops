name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for secrets
        run: |
          echo "Scanning for potential secrets..."

          # Check for common secret patterns
          patterns=(
            "API_KEY"
            "SECRET_KEY"
            "PRIVATE_KEY"
            "PASSWORD"
            "TOKEN"
            "CREDENTIALS"
            "api_key"
            "secret_key"
            "private_key"
            "password"
            "token"
            "sk-"
            "sk_"
            "ghp_"
            "gho_"
            "ghu_"
            "ghs_"
            "ghr_"
          )

          found_secrets=false
          for pattern in "${patterns[@]}"; do
            if grep -r "$pattern" --include="*.py" --include="*.md" --include="*.yml" --include="*.yaml" . | grep -v ".github/workflows/secret-scan.yml" | grep -v "SECURITY.md" | grep -v "secret-scan"; then
              echo "⚠️  Found potential secret: $pattern"
              found_secrets=true
            fi
          done

          if [ "$found_secrets" = true ]; then
            echo "❌ Potential secrets found! Please review."
            exit 1
          fi

          echo "✅ No obvious secrets found"

      - name: Check for .env files
        run: |
          echo "Checking for .env files..."
          if find . -name ".env*" -not -path "./.git/*"; then
            echo "❌ Found .env files (should be in .gitignore)"
            exit 1
          fi
          echo "✅ No .env files in repository"

      - name: Verify .gitignore
        run: |
          echo "Checking .gitignore..."

          # Check that data/ is gitignored
          if ! grep -q "^data/$" .gitignore 2>/dev/null; then
            echo "⚠️  data/ should be in .gitignore"
          fi

          # Check that .env is gitignored
          if ! grep -q "^\.env" .gitignore 2>/dev/null; then
            echo "⚠️  .env should be in .gitignore"
          fi

          echo "✅ .gitignore checks passed"
