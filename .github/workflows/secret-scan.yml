name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for secrets
        run: |
          echo "Scanning for potential secrets..."

          # Check for realistic secret patterns (not just words)
          # These patterns match actual secret formats, not documentation
          patterns=(
            # GitHub tokens (real format)
            "ghp_[A-Za-z0-9]{36}"
            "gho_[A-Za-z0-9]{36}"
            "ghu_[A-Za-z0-9]{36}"
            "ghs_[A-Za-z0-9]{36}"
            "ghr_[A-Za-z0-9]{36}"

            # OpenAI API keys (real format)
            "sk-[a-zA-Z0-9]{48}"

            # AWS keys (real format)
            "AKIA[0-9A-Z]{16}"

            # Generic API key patterns with values
            "api_key[[:space:]]*=[[:space:]]*['\"][^'\"]{16,}['\"]"
            "apikey[[:space:]]*=[[:space:]]*['\"][^'\"]{16,}['\"]"

            # Secret patterns with values
            "secret[[:space:]]*=[[:space:]]*['\"][^'\"]{16,}['\"]"
            "password[[:space:]]*=[[:space:]]*['\"][^'\"]{8,}['\"]"
            "token[[:space:]]*:[[:space:]]*['\"][^'\"]{16,}['\"]"
          )

          found_secrets=false
          for pattern in "${patterns[@]}"; do
            # Skip if pattern appears in this workflow file (documentation)
            if grep "$pattern" .github/workflows/secret-scan.yml > /dev/null 2>&1; then
              continue
            fi

            # Search in code files only (not documentation)
            if grep -rE "$pattern" \
              --include="*.py" \
              --include="*.yml" \
              --include="*.yaml" \
              --include="*.json" \
              --include="*.toml" \
              --include="*.env*" \
              . 2>/dev/null | \
              grep -v ".github/workflows/secret-scan.yml" | \
              grep -v ".env.example" | \
              grep -v "# ponytail:" | \
              grep -v "# Example:"; then
              echo "⚠️  Found potential secret matching pattern: $pattern"
              found_secrets=true
            fi
          done

          if [ "$found_secrets" = true ]; then
            echo "❌ Potential secrets found! Please review."
            exit 1
          fi

          echo "✅ No obvious secrets found"

      - name: Check for .env files (should be .env.example only)
        run: |
          echo "Checking for .env files..."

          # Find .env files that are NOT .env.example
          if find . -name ".env" -not -name ".env.example" -not -path "./.git/*" | grep -q .; then
            echo "❌ Found .env files (should be .env.example only)"
            exit 1
          fi

          # Check .env.example is safe (no real values)
          if [ -f ".env.example" ]; then
            # .env.example should only contain placeholder values
            suspicious=$(grep -E "=[a-zA-Z0-9/_-]{20,}" .env.example || true)
            if [ -n "$suspicious" ]; then
              echo "⚠️  .env.example contains potential real values:"
              echo "$suspicious"
              echo "Please use placeholders like YOUR_API_KEY_HERE"
              exit 1
            fi
          fi

          echo "✅ .env files check passed"

      - name: Verify .gitignore
        run: |
          echo "Checking .gitignore..."

          # Check that data/ is gitignored
          if ! grep -q "^data/$" .gitignore 2>/dev/null; then
            echo "⚠️  data/ should be in .gitignore"
          fi

          # Check that .env is gitignored
          if ! grep -q "^\.env$" .gitignore 2>/dev/null; then
            echo "⚠️  .env should be in .gitignore"
          fi

          # Check that .env files with suffixes are ignored
          if ! grep -q "\.env" .gitignore 2>/dev/null; then
            echo "⚠️  .env* should be in .gitignore"
          fi

          # Check that common secret files are ignored
          for pattern in "*.pem" "*.key" "*.secret" "*.credentials" "secrets/"; do
            if ! grep -q "$pattern" .gitignore 2>/dev/null; then
              echo "⚠️  $pattern should be in .gitignore"
            fi
          done

          echo "✅ .gitignore checks completed"

      - name: Check for hardcoded secrets in Python files
        run: |
          echo "Checking Python files for hardcoded secrets..."

          # Look for assignments that look like secrets
          if grep -rE \
            -e "(api[_-]?key|secret|token|password)[[:space:]]*=[[:space:]]*['\"][^'\"]{16,}['\"]" \
            --include="*.py" \
            . 2>/dev/null | \
            grep -v "test" | \
            grep -v "example" | \
            grep -v "placeholder" | \
            grep -v "YOUR_"; then
            echo "⚠️  Found potential hardcoded secrets in Python files"
            exit 1
          fi

          echo "✅ Python files check passed"
