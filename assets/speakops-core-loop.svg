<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="800" height="250">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      .label { font-family: 'JetBrains Mono', monospace; }
      .title { font-family: 'JetBrains Mono', monospace; font-weight: 700; }
      .step-label { font-family: 'JetBrains Mono', monospace; font-size: 11; }
      .connector { stroke: #6F95A5; stroke-width: 2; fill: none; }
      .box { fill: #172126; stroke: #8A969E; stroke-width: 1.5; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="250" fill="#11181C"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#D8DEE3" class="title" font-size="20">Core Loop: Activation Over Memorization</text>
  <text x="400" y="55" text-anchor="middle" fill="#8A969E" class="label" font-size="12">Local-first voice practice system with feedback loops</text>

  <!-- Main Diagram -->
  <g transform="translate(40, 80)">

    <!-- Source -->
    <g>
      <rect x="0" y="0" width="100" height="40" rx="4" class="box"/>
      <text x="50" y="25" text-anchor="middle" fill="#8FAE9A" class="step-label" font-size="11">Source</text>
    </g>

    <!-- Arrow 1 -->
    <path d="M 110 20 L 150 20" class="connector"/>
    <polygon points="145,16 155 20 145,24" fill="#6F95A5"/>

    <!-- Phrase Extraction -->
    <g transform="translate(160, 0)">
      <rect x="0" y="0" width="120" height="40" rx="4" class="box"/>
      <text x="60" y="25" text-anchor="middle" fill="#B7A27A" class="step-label" font-size="11">Phrase Extraction</text>
    </g>

    <!-- Arrow 2 -->
    <path d="M 290 20 L 330 20" class="connector"/>
    <polygon points="325,16 335 20 325,24" fill="#6F95A5"/>

    <!-- Voice Drill -->
    <g transform="translate(340, 0)">
      <rect x="0" y="0" width="100" height="40" rx="4" class="box"/>
      <text x="50" y="25" text-anchor="middle" fill="#B7A27A" class="step-label" font-size="11">Voice Drill</text>
    </g>

    <!-- Arrow 3 -->
    <path d="M 450 20 L 490 20" class="connector"/>
    <polygon points="485,16 495 20 485,24" fill="#6F95A5"/>

    <!-- Spoken Answer -->
    <g transform="translate(500, 0)">
      <rect x="0" y="0" width="110" height="40" rx="4" class="box"/>
      <text x="55" y="25" text-anchor="middle" fill="#8FAE9A" class="step-label" font-size="11">Spoken Answer</text>
    </g>

    <!-- Arrow 4 -->
    <path d="M 620 20 L 660 20" class="connector"/>
    <polygon points="655,16 665 20 655,24" fill="#6F95A5"/>

    <!-- Scoring -->
    <g transform="translate(670, 0)">
      <rect x="0" y="0" width="80" height="40" rx="4" class="box"/>
      <text x="40" y="25" text-anchor="middle" fill="#B97868" class="step-label" font-size="11">Scoring</text>
    </g>

    <!-- Arrow 5 (curved back) -->
    <path d="M 670 60 Q 400 90 130 60" class="connector" stroke-dasharray="5,3"/>
    <polygon points="135,56 125,60 135,64" fill="#6F95A5"/>

    <!-- Feedback -->
    <g transform="translate(40, 70)">
      <rect x="0" y="0" width="100" height="40" rx="4" class="box"/>
      <text x="50" y="25" text-anchor="middle" fill="#8FAE9A" class="step-label" font-size="11">Feedback</text>
    </g>

    <!-- Arrow 6 (back to Voice Drill) -->
    <path d="M 150 110 L 390 110" class="connector"/>
    <polygon points="385,106 395 110 385,114" fill="#6F95A5"/>

    <!-- Repetition label -->
    <text x="400" y="130" text-anchor="middle" fill="#B7A27A" class="title" font-size="14">Repetition</text>
    <text x="400" y="150" text-anchor="middle" fill="#8A969E" class="label" font-size="11">Weak phrases replayed in new contexts</text>
  </g>

  <!-- Bottom info -->
  <text x="400" y="210" text-anchor="middle" fill="#6F95A5" class="label" font-size="11">ChatGPT Voice Mode (user runtime) • Local scoring • Progress tracking</text>
  <text x="400" y="230" text-anchor="middle" fill="#8A969E" class="label" font-size="10">© 2025 SpeakOps • MIT License</text>
</svg>
